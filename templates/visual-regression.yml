# DojoWatch Visual Regression — GitHub Actions Workflow Template
#
# Copy this file to your project's .github/workflows/ directory.
# Adjust the dev server start command and port as needed.
#
# Required secrets:
#   GOOGLE_GENAI_API_KEY — Gemini API key for AI analysis
#   GITHUB_TOKEN — automatically provided by GitHub Actions
#
# Optional secrets (for Supabase upload):
#   SUPABASE_SERVICE_KEY — Supabase service role key

name: Visual Regression

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: vr-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  visual-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # Cache Playwright browsers
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright deps (cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      # Pin fonts for deterministic screenshots across environments
      - name: Install fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto fonts-noto-cjk fonts-liberation > /dev/null 2>&1

      # Start your dev server (adjust command and port as needed)
      - name: Start dev server
        run: npm run dev &
        env:
          PORT: 3000

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 60000

      # Run DojoWatch analysis
      # Adjust the path to dojowatch scripts based on your setup:
      #   Git submodule: ./dojowatch/scripts/ci.ts
      #   Node modules:  ./node_modules/dojowatch/scripts/ci.ts
      - name: Run DojoWatch
        id: dojowatch
        run: npx tsx path/to/dojowatch/scripts/ci.ts --pr ${{ github.event.pull_request.number }} --upload
        env:
          GOOGLE_GENAI_API_KEY: ${{ secrets.GOOGLE_GENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        continue-on-error: true

      # Upload diff images as artifacts for manual review
      - name: Upload diff artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dojowatch-diffs-${{ github.event.pull_request.number }}
          path: |
            .dojowatch/diffs/
            .dojowatch/captures/
            .dojowatch/last-check.json
            .dojowatch/prefilter-report.json
          retention-days: 7
          if-no-files-found: ignore

      # Fail the check only on high-severity regressions (exit code 1 from ci.ts)
      # Infra failures (exit code != 0 and != 1) don't block the PR
      - name: Check result
        if: steps.dojowatch.outcome == 'failure' && steps.dojowatch.conclusion == 'failure'
        run: |
          echo "DojoWatch detected regressions. Check the PR comment for details."
          exit 1
